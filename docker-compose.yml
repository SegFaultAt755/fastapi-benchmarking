version: '3.8'

services:
  database:
    image: postgres:17
    container_name: database
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fastapi_database_benchmarking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fastapi_database_benchmarking"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build: .
    container_name: app
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
